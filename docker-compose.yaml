services:
  
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db  

  
  backend:
    build:
      context: ./Server       
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb              
    environment:
      - MONGO_URL=mongodb://mongodb:27017/

volumes:
  mongo_data:               